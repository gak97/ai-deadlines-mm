name: Update Conference Deadlines

on:
  schedule:
    - cron: '0 0 * * *' # Daily at midnight UTC
  workflow_dispatch: # Allows manual triggering

jobs:
  update_deadlines:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push changes back to the repo
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download conferences.yml from upstream
        run: |
          curl -L https://raw.githubusercontent.com/paperswithcode/ai-deadlines/gh-pages/_data/conferences.yml -o _data/conferences.yml

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add _data/conferences.yml
          if git diff --cached --quiet; then
            echo "No updates; exiting."
          else
            git commit -m "Automated update of conference deadlines from upstream"
            git push origin gh-pages
          fi
