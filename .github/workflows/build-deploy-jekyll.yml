name: Build and Deploy Jekyll Site

on:
  push:
    branches:
      - gh-pages

permissions:
  contents: write

concurrency:
  group: "gh-pages-build"
  cancel-in-progress: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true # Runs bundle install and caches gems

      - name: Build Jekyll Site
        run: bundle exec jekyll build --baseurl "/ai-deadlines-mm"

      - name: Deploy built site
        run: |
          # Configure Git
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          # Create a temporary directory for the new site
          mkdir ../_site_temp
          cp -R _site/* ../_site_temp/
          
          # List of files and directories to preserve
          # These are essential for the project to function
          PRESERVE_FILES=(
            "README.md"
            "CNAME"
            "Gemfile"
            "Gemfile.lock"
            "consolidated_conference_updater.py"
            "requirements.txt"
            "_config.yml"
            "generate_html.py"
            "generate_conference_pages.py"
            "index_template.html"
            "UPDATES.md"
            "ai-deadlines.ics"
            "feed.xml"
          )
          
          PRESERVE_DIRS=(
            "_data"
            "conference"
            "calendar"
            "static"
            "assets"
            "utils"
          )
          
          # Create backup of files to preserve
          mkdir ../backup
          for file in "${PRESERVE_FILES[@]}"; do
            if [ -f "$file" ]; then
              cp "$file" "../backup/"
            fi
          done
          
          # Create backup of directories to preserve
          for dir in "${PRESERVE_DIRS[@]}"; do
            if [ -d "$dir" ]; then
              cp -R "$dir" "../backup/"
            fi
          done
          
          # Remove all files and directories except .git and .github
          find . -maxdepth 1 -mindepth 1 -not -name '.git' -not -name '.github' -exec rm -rf {} +
          
          # Restore preserved files
          for file in "${PRESERVE_FILES[@]}"; do
            if [ -f "../backup/$file" ]; then
              cp "../backup/$file" .
            fi
          done
          
          # Restore preserved directories
          for dir in "${PRESERVE_DIRS[@]}"; do
            if [ -d "../backup/$dir" ]; then
              cp -R "../backup/$dir" .
            fi
          done
          
          # Copy the new site from the temporary directory
          cp -R ../_site_temp/* .
          rm -rf ../_site_temp ../backup

          # Add all changes (new files, deleted files)
          git add -A

          # Commit and push if there are changes
          if ! git diff-index --quiet HEAD; then
            echo "Committing and pushing changes..."
            git commit -m "Deploy Jekyll site to gh-pages (from $(git rev-parse --short HEAD))"
            git push origin gh-pages
          else
            echo "No changes to deploy."
          fi
