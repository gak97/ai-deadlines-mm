name: Build and Deploy Jekyll Site

on:
  push:
    branches:
      - gh-pages

permissions:
  contents: write

concurrency:
  group: "gh-pages-build"
  cancel-in-progress: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'
          bundler-cache: true # Runs bundle install and caches gems

      - name: Build Jekyll Site
        run: bundle exec jekyll build --baseurl "/ai-deadlines-mm"

      - name: Deploy built site
        run: |
          # This command stages all files in _site, then moves them to the root,
          # then commits any changes.
          # The GITHUB_SHA is used to avoid an infinite loop of workflow triggers if possible.
          # The current commit SHA
          CURRENT_SHA=$(git rev-parse HEAD)

          # Configure Git
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          # Add _site contents to a temporary index
          git add -f _site

          # Perform a tree diff to see if _site contents are different from current root
          # This is a bit complex, an easier way is to just try to commit and see if it makes changes.
          # For simplicity, we'll assume if the build runs, there might be changes.
          # A more robust check would be `git diff-index --quiet HEAD -- _site/` after `git add -f _site`
          # but that requires more complex scripting to get right with directory contents.

          # Use rsync to copy contents of _site to root, deleting old files from root
          # that are not in the new _site. This makes the root a mirror of _site.
          # The --delete flag is important here.
          # We need to make sure we don't delete the .git directory or .github directory.
          rsync -av --delete --exclude ".git" --exclude ".github" _site/ .

          # Add all changes, including deletions in the root that were not in _site
          git add -A

          # Check if there are any changes to commit
          if ! git diff-index --quiet HEAD; then
            git commit -m "Deploy Jekyll site from Action (commit ${CURRENT_SHA})"
            git push origin gh-pages
          else
            echo "No changes to deploy."
          
