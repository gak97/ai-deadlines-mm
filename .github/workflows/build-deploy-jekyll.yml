name: Build and Deploy Jekyll Site

on:
  push:
    branches:
      - gh-pages

permissions:
  contents: write

concurrency:
  group: "gh-pages-build"
  cancel-in-progress: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true # Runs bundle install and caches gems

      - name: Build Jekyll Site
        run: bundle exec jekyll build --baseurl "/ai-deadlines-mm"

      - name: Deploy built site
        run: |
          # Configure Git
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          # Clean the working directory except for .git, .github, and other essentials.
          # This prepares for a clean copy of the _site contents.
          # IMPORTANT: List any files or directories at the root level that are NOT part of the
          # Jekyll _site output but MUST be preserved on the gh-pages branch.
          # For example, if you have CNAME, README.md, update_conferences.py, requirements.txt,
          # Gemfile, Gemfile.lock, _data/ etc. at the root, they should be preserved.
          # The current script assumes that everything not in _site should be replaced.
          # A better approach is to specify what to keep.
          
          # Create a temporary directory for the new site
          mkdir ../_site_temp
          cp -R _site/* ../_site_temp/
          
          # Clean current directory - BE CAREFUL WITH THIS COMMAND
          # This will remove everything except .git and .github (and files specified in the find command)
          # Add any other files/dirs you need to preserve in the -not -path arguments
          git ls-files | grep -vE '^(\.git|\.github)' | xargs -r rm -f
          find . -maxdepth 1 -type d -not -name '.' -not -name '.git' -not -name '.github' -not -name '_data' -exec rm -rf {} +
          find . -maxdepth 1 -type f -not -name 'README.md' -not -name 'CNAME' -not -name 'Gemfile' -not -name 'Gemfile.lock' -not -name 'update_conferences.py' -not -name 'requirements.txt' -exec rm -f {} +


          # Copy the new site from the temporary directory
          cp -R ../_site_temp/* .
          rm -rf ../_site_temp

          # Add all changes (new files, deleted files)
          git add -A

          # Commit and push if there are changes
          if ! git diff-index --quiet HEAD; then
            echo "Committing and pushing changes..."
            git commit -m "Deploy Jekyll site to gh-pages (from $(git rev-parse --short HEAD))"
            git push origin gh-pages
          else
            echo "No changes to deploy."
          fi
