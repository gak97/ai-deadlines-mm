name: Build and Deploy Jekyll Site

on:
  push:
    branches:
      - gh-pages

permissions:
  contents: write

concurrency:
  group: "gh-pages-build"
  cancel-in-progress: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Decide whether to build
        id: check
        run: |
          if [[ -f Gemfile && -f _config.yml ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        if: steps.check.outputs.run == 'true'
        with:
          ruby-version: '3.2'
          bundler-cache: true # Runs bundle install and caches gems

      - name: Build Jekyll Site
        if: steps.check.outputs.run == 'true'
        run: bundle exec jekyll build --baseurl "/ai-deadlines-mm"

      - name: Deploy built site
        if: steps.check.outputs.run == 'true'
        run: |
          # Configure Git
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          # Copy built site on top of the working tree without deleting other tracked files
          if [ -d _site ]; then
            cp -R _site/* .
          fi

          # Add all changes (new files, deleted files)
          git add -A

          # Commit and push if there are changes
          if ! git diff-index --quiet HEAD; then
            echo "Committing and pushing changes..."
            git commit -m "Deploy Jekyll site to gh-pages (from $(git rev-parse --short HEAD))"
            git push origin gh-pages
          else
            echo "No changes to deploy."
          fi
