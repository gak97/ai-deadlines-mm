    <script type="text/javascript" charset="utf-8">
        $(function() {
            var subs = [];
            var _all_subs = [];
            
            // Get all subs
            var conf_type_data = [
                {"name":"Machine Learning","sub":"ML","color":"#ffd300"},
                {"name":"Computer Vision","sub":"CV","color":"#deff0a"},
                {"name":"Computer Graphics","sub":"CG","color":"#0aefff"},
                {"name":"Natural Language Proc","sub":"NLP","color":"#147df5"},
                {"name":"Robotics","sub":"RO","color":"#0aff99"},
                {"name":"Speech/SigProc","sub":"SP","color":"#580aff"},
                {"name":"Data Mining","sub":"DM","color":"#be0aff"},
                {"name":"Automated Planning","sub":"AP","color":"#a432a8"},
                {"name":"Knowledge Representation","sub":"KR","color":"#32a855"},
                {"name":"Human-Computer Interaction","sub":"HCI","color":"#a83232"}
            ];
            
            var sub2name = {}; 
            var name2sub = {};
            
            for (var i = 0; i < conf_type_data.length; i++) {
                _all_subs[i] = conf_type_data[i]['sub'];
                sub2name[conf_type_data[i]['sub']] = conf_type_data[i]['name'];
                name2sub[conf_type_data[i]['name']] = conf_type_data[i]['sub'];
            }
            
            const all_subs = _all_subs;

            // Borrowed from https://github.com/moment/moment-timezone/issues/167
            // Adds support for time zones 'UTC-12'..'UTC+12'
            function addUtcTimeZones() {
                // Moment.js uses the IANA timezone database, which supports generic time zones like 'Etc/GMT+1'.
                // However, the signs for these time zones are inverted compared to ISO 8601.
                // For more details, see https://github.com/moment/moment-timezone/issues/167
                for (let offset = -12; offset <= 12; offset++) {
                    const posixSign = offset <= 0 ? "+" : "-";
                    const isoSign = offset >= 0 ? "+" : "-";
                    const link = `Etc/GMT${posixSign}${Math.abs(offset)}|UTC${isoSign}${Math.abs(offset)}`;
                    moment.tz.link(link);
                }
            }

            function update_filtering(data) {
                var page_url = "/ai-deadlines-mm";
                store.set("gak97.github.io-subs", data.subs);

                $(".ConfItem").hide();
                for (const j in data.all_subs) {
                    const s = data.all_subs[j];
                    const identifier = "." + s + "-conf";
                    if (data.subs.includes(s)) {
                        $(identifier).show();
                    }
                }

                if (subs.length == 0) {
                    window.history.pushState("", "", page_url);
                } else {
                    window.history.pushState("", "", page_url + "/?sub=" + data.subs.join());
                }
            }

            function createCalendarFromObject(data) {
                return createCalendar({
                    options: {
                        class: "calendar-obj",
                        id: data.id,
                    },
                    data: {
                        title: data.title,
                        start: data.date,
                        duration: 60,
                    },
                });
            }

            // Multi-select handler
            $('#subjects').multiselect({
                buttonClass: 'btn btn-outline-secondary',
                buttonWidth: '100%',
                buttonContainer: '<div class="btn-group" style="width:100%;" />',
                maxHeight: 300,
                buttonText: function(options) {
                    if (options.length == 0) {
                        return 'All subjects <b class="caret"></b>';
                    }
                    else if (options.length > 3) {
                        return options.length + ' subjects selected <b class="caret"></b>';
                    }
                    else {
                        var selected = '';
                        options.each(function() {
                            selected += $(this).text() + ', ';
                        });
                        return selected.substr(0, selected.length - 2) + ' <b class="caret"></b>';
                    }
                },
                onChange: function(option, checked) {
                    if (checked) {
                        subs.push($(option).val());
                    } else {
                        subs = subs.filter(function(item) { return item !== $(option).val(); });
                    }
                    update_filtering({subs: subs, all_subs: all_subs});
                }
            });

            // Load saved filters
            var saved_subs = store.get("gak97.github.io-subs");
            if (saved_subs) {
                subs = saved_subs;
                $('#subjects').multiselect('select', subs);
                update_filtering({subs: subs, all_subs: all_subs});
            }

            // Subject tag click handler
            $(document).on('click', '.conf-sub', function() {
                var sub = $(this).data('sub');
                if (subs.includes(sub)) {
                    subs = subs.filter(function(item) { return item !== sub; });
                    $('#subjects').multiselect('deselect', sub);
                } else {
                    subs.push(sub);
                    $('#subjects').multiselect('select', sub);
                }
                update_filtering({subs: subs, all_subs: all_subs});
            });

            addUtcTimeZones();

            // Conference data and processing will be added here by the generation script
        });
    </script>
