# Site settings
title: AI Deadlines
email: your-email@domain.com
description: >- # this means to ignore newlines until "baseurl:"
  A comprehensive list of AI conference deadlines.
baseurl: "/ai-deadlines-mm" # the subpath of your site, e.g. /blog
url: "https://ai-deadlines.github.io" # the base hostname & protocol for your site, e.g. http://example.com
twitter_username: jekyllrb
github_username:  jekyll

# Build settings
markdown: kramdown
# theme: minima  # Commented out since we're using custom HTML
plugins:
  - jekyll-feed

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - generate_html.py
  - generate_conference_pages.py
  - index_template.html
  - consolidated_conference_updater.py
  - requirements.txt
  - utils/
  - .github/



